<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen & Download Now</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .cover-art {
            width: 180px;
            height: 180px;
            background-color: #444;
            margin: 0 auto 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background-size: cover;
            background-position: center;
        }
        h1 { font-size: 24px; margin: 10px 0 5px; }
        h2 { font-size: 16px; color: #ccc; font-weight: 300; margin: 0 0 25px; }

        .platform-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s, transform 0.1s;
            background: rgba(255, 255, 255, 0.08);
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .action-text {
            font-size: 13px;
            font-weight: normal;
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .download { border-left: 4px solid #28a745; }
        .spotify { border-left: 4px solid #1DB954; }
        .apple { border-left: 4px solid #FC3C44; }
        .youtube { border-left: 4px solid #FF0000; }
        .buy { border-left: 4px solid #f0a500; }

        audio {
            width: 100%;
            margin-top: 20px;
        }
        iframe {
            width: 100%;
            max-width: 400px;
            height: 220px;
            margin-top: 20px;
            border-radius: 12px;
        }
        hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.2);
            margin: 25px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Song Artwork -->
        <div class="cover-art" id="coverArt"></div>

        <!-- Song Details -->
        <h1 id="songTitle">Song Title</h1>
        <h2 id="artistName">Artist Name</h2>

        <!-- Destination Links -->
        <div class="platform-list">
            <!-- Direct Audio Download -->
            <a href="#" class="btn download" download target="_blank">
                <span>💾 Direct Download</span>
                <span class="action-text">download</span>
            </a>

            <!-- Streaming Services -->
            <a href="#" class="btn spotify" target="_blank">
                <span>🟢 Spotify</span>
                <span class="action-text">Stream</span>
            </a>

            <a href="#" class="btn apple" target="_blank">
                <span>🍎 Apple Music</span>
                <span class="action-text">Stream</span>
            </a>

            <a href="https://www.youtube.com/watch?v=9s0gRg3ZxAs" class="btn youtube" target="_blank">
                <span>🔴 YouTube</span>
                <span class="action-text">Watch</span>
            </a>

            <a href="https://unitedmasters.com/m/silverback-gorilla" class="btn buy" target="_blank">
                <span>🛒 Buy Link</span>
                <span class="action-text">buy</span>
            </a>
        </div>

        <!-- Audio Player -->
        <audio src="https://radio.tsunamiflow.club/Music/Inspiration/Motivation/Silverback%20Gorilla.wav" controls controlsList="nodownload"></audio>

        <hr>

        <!-- YouTube Embed -->
        <iframe src="https://www.youtube.com/embed/9s0gRg3ZxAs?si=NMNM9EExbLTgRJBn" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>

    <script>
        // QUICK CUSTOMIZATION PANEL
        const songConfig = {
            title: "Silverback Gorilla",
            artist: "Mishuba",
            coverUrl: "", // add a real image URL here
            downloadUrl: "https://radio.tsunamiflow.club/Music/Inspiration/Motivation/Silverback%20Gorilla.wav",
            spotifyUrl: "https://open.spotify.com/track/00m7bg8Np8kQ8TwXyz8vrE?si=MG3Y-gYhQz2SjVhFdQcEng",
            appleUrl: "https://music.apple.com/us/album/silverback-gorilla-single/6783850617",
            youtubeUrl: "https://www.youtube.com/watch?v=9s0gRg3ZxAs",
            buyUrl: "https://unitedmasters.com/m/silverback-gorilla"
        };

        document.getElementById('songTitle').textContent = songConfig.title;
        document.getElementById('artistName').textContent = songConfig.artist;
        if (songConfig.coverUrl) {
            document.getElementById('coverArt').style.backgroundImage = `url('${songConfig.coverUrl}')`;
        }

        const downloadBtn = document.querySelector('.download');
        downloadBtn.href = songConfig.downloadUrl;
        downloadBtn.setAttribute('download', `${songConfig.title}.wav`);

        document.querySelector('.spotify').href = songConfig.spotifyUrl;
        document.querySelector('.apple').href = songConfig.appleUrl;
        document.querySelector('.youtube').href = songConfig.youtubeUrl;
        document.querySelector('.buy').href = songConfig.buyUrl;
    </script>
</body>
</html>
