<html lang="en">

<head>
    <title>Chroma Key Canvas</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
    <meta name="keyword"
        content="mishuba, challenges, business, music, property, rap, pop, rock, news, thoughts, clothes, shoes, games, shows, movies, books, love, inspiration, information, research" />
    <meta name="description"
        content="Tsunami Flow is the homebase for turning your dreams to goals and mastering your life." />
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #TFcanvas {
            border: 1px solid black;
        }

        #TsunamiFlowVideoStuff {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip-path: inset(100%);
        }

        #TFchromaKey {
            margin-top: 10px;
        }

        .button {
            display: block;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h1>Chroma Key Canvas</h1>
    <button id="TfControlShit">Press To have access to button controls.</button>
    <button id="TfStartShit">Press to start your webcam</button>
    <button id="TfStopShit">Stop Webcam</button>

    <label for="chromaColorWebcam">Choose Chroma Key Color for Webcam:</label>
    <input type="color" id="TFchromaKey" value="#00ff00">
    <button id="TuseFthisKeycolor">Use Webcam Chroma Key Color</button>

    <button id="rmvTFchromakey">Remove Chroma Key Color</button>

    <video id="TsunamiFlowVideoStuff" width="640" height="480" autoplay></video>
    <input type="file" id="TFuploadImage" accept="image/*">
    <button id="rmvTFimg">Remove Image</button>
    <input type="file" id="TFuploadVideo" accept="video/*">
    <button id="rmvTFvid">Remove Video</button>
    <canvas id="TFcanvas" width="640" height="480"></canvas>
    <button id="TfStartRecPlz">Start Recording</button>
    <button id="TfStopRecPlz">Stop Recording</button>

    <div>
        <label>Stream Key:</label>

        <input id="streamKey" placeholder="Enter Stream Key" /><br><br>
        <label>Role:</label><br>
        <select id="role" style="width:200px;">
            <option value="broadcaster">broadcaster</option>
            <option value="audio_only">audio_only</option>
        </select><br><br>
        <button id="GoLive">Start Broadcast</button>
        <button id="StopLive">Stop</button><br>
        <label><input type="checkbox" id="videoToggle" checked> Include Video</label>
        <label><input type="checkbox" id="musicToggle" checked> Include Music</label>
    </div>


    <div class="section playlist">
        <h3>🎶 Music Player</h3>
        <audio id="music" controls></audio><br>
        <select id="playlist">
            <option value="">-- Select Song --</option>
            <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Song 1</option>
            <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Song 2</option>
            <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">Song 3</option>
        </select>
        <input type="file" id="fileInput" accept="audio/*">
    </div>

    <div class="section soundboard">
        <h3>🎛️ Sound Effects</h3>
        <button data-sound="crowd">Crowd Clapping</button>
        <button data-sound="bomb">Bomb</button>
        <button data-sound="gun">Gun Shots</button>
        <button data-sound="laugh">Crowd Laughing</button>
        <button data-sound="intro">Intro</button>
        <button data-sound="hellnah">Hell Nah</button>
        <button data-sound="shock">Shocked</button>
        <button data-sound="wtf">Questioned (WTF)</button>
        <button data-sound="other">Other</button>
    </div>

    <div class="section sliders">
        <div class="slider-group">
            <label>🎤 Mic Volume</label><br>
            <input type="range" id="micVol" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="slider-group">
            <label>🎵 Music Volume</label><br>
            <input type="range" id="musicVol" min="0" max="1" step="0.01" value="0.8">
        </div>
        <div class="slider-group">
            <label>💥 Effects Volume</label><br>
            <input type="range" id="fxVol" min="0" max="1" step="0.01" value="0.9">
        </div>
    </div>
    <h3>Log</h3>
    <div id="TsunamiLog"></div>
